workflows:
  android-debug:
    name: OmniGraph Mobile Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          cd OmnigraphCodexMobile
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          fi
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - OmnigraphCodexMobile/app/build/outputs/apk/debug/*.apk
